version: '3.8'

services:
  binance-mcp:
    build: .
    restart: unless-stopped
    network_mode: host
    environment:
      - BINANCE_API_KEY=${BINANCE_API_KEY}
      - BINANCE_API_SECRET=${BINANCE_API_SECRET}
      - BINANCE_MCP_PASSPHRASE=${BINANCE_MCP_PASSPHRASE}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./vault:/app/vault
    env_file:
      - .env.docker
